name: Cloud Functions deployen

# Deployt die Firebase Cloud Functions automatisch:
#  - bei jeder Änderung an functions/ auf dem main-Branch
#  - oder manuell über den "Run workflow"-Knopf (Actions-Tab)
on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - 'firebase.json'
      - '.firebaserc'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Node 20 einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Functions-Abhängigkeiten installieren
        working-directory: functions
        run: npm install

      - name: .env für Functions schreiben (Geheim-Schlüssel)
        run: |
          echo "BDAY_TEST_KEY=${{ secrets.BDAY_TEST_KEY }}" > functions/.env
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> functions/.env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> functions/.env

      - name: Google-Auth (Service-Account aus GitHub-Secret)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SA_KEY }}

      - name: Firebase CLI installieren
        run: npm install -g firebase-tools

      - name: Functions deployen
        run: firebase deploy --only functions --project formenchat --non-interactive --force
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
